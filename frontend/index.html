<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Remote Mouse v1.0.0</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<style>
:root{
  --bg:#0a0a0a;--bg2:#0d0d0d;--bg3:#111;--bg4:#1a1a1a;
  --border:#1a1a1a;--border2:#222;
  --text:#fff;--text2:#666;--text3:#888;--text4:#555;--text5:#333;--text6:#444;
  --accent:#4ade80;--accent2:#22c55e;--danger:#f87171;
  --drag-bg:#141414;--drag-on-bg:#1a2a1a;--mode-border:#2a4a2a;--disabled-bg:#1a4a2a;
  --glow:rgba(74,222,128,.35);--glow2:rgba(74,222,128,.15);--glow3:rgba(74,222,128,.6);--glow4:rgba(74,222,128,.03);--glow5:rgba(74,222,128,.025);--glow6:rgba(74,222,128,0);--glow7:rgba(74,222,128,.4)
}
:root.light{
  --bg:#e8e8e8;--bg2:#ffffff;--bg3:#eeeeee;--bg4:#d5d5d5;
  --border:#c8c8c8;--border2:#b0b0b0;
  --text:#222;--text2:#666;--text3:#888;--text4:#999;--text5:#bbb;--text6:#999;
  --accent:#22c55e;--accent2:#16a34a;--danger:#ef4444;
  --drag-bg:#e0e0e0;--drag-on-bg:#dcfce7;--mode-border:#86efac;--disabled-bg:#bbf7d0;
  --glow:rgba(34,197,94,.25);--glow2:rgba(34,197,94,.12);--glow3:rgba(34,197,94,.5);--glow4:rgba(34,197,94,.05);--glow5:rgba(34,197,94,.04);--glow6:rgba(34,197,94,0);--glow7:rgba(34,197,94,.3)
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100%}

/* Status bar */
#status-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:12px;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);min-height:44px}
#status-bar .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;background:var(--text4)}
#status-bar .dot.on{background:var(--accent);box-shadow:0 0 6px var(--glow7)}
#status-ip{color:var(--text6)}
#theme-btn{cursor:pointer;font-size:15px;color:var(--text3);background:none;border:none;padding:0 2px;line-height:1;touch-action:manipulation}

/* Pages */
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}

/* Touchpad page */
#touchpad{flex:1;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:default;position:relative;overflow:hidden;background-image:radial-gradient(circle at 25% 40%,var(--glow4) 0%,transparent 50%),radial-gradient(circle at 75% 60%,var(--glow5) 0%,transparent 50%)}
#touchpad.dim{background:var(--bg2)}
#touchpad-label{font-size:13px;color:var(--text5);pointer-events:none;transition:opacity .3s;position:relative;z-index:1}
#touchpad.dim #touchpad-label{opacity:0}
#scroll-zone{position:absolute;right:0;top:0;bottom:0;width:36px;background:rgba(128,128,128,.03);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text5)}

/* Touch cursor */
#touch-cursor{position:absolute;pointer-events:none;z-index:5;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);border:1.5px solid var(--glow2);transform:translate(-50%,-50%);opacity:0;transition:opacity .1s ease}
#touch-cursor.show{opacity:1}

/* Tap ripple */
@keyframes t-ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:.6}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
#tap-ripple{position:absolute;pointer-events:none;z-index:4;width:20px;height:20px;border-radius:50%;border:2.5px solid var(--glow3);transform:translate(-50%,-50%);opacity:0}
#tap-ripple.go{animation:t-ripple .35s ease-out forwards;opacity:1}

/* Long-press ring */
@keyframes l-ring{0%{transform:translate(-50%,-50%) scale(0);opacity:.5}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
#long-ring{position:absolute;pointer-events:none;z-index:4;width:28px;height:28px;border-radius:50%;border:3px solid var(--danger);transform:translate(-50%,-50%);opacity:0}
#long-ring.go{animation:l-ring .4s ease-out forwards;opacity:1}

/* Scroll indicator */
#scroll-ind{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:12px;color:var(--accent);opacity:0;transition:opacity .2s;pointer-events:none;z-index:3;line-height:1}
#scroll-ind.show{opacity:1}
@keyframes sb0{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes sb1{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
#scroll-ind .u{animation:sb0 .5s ease-in-out infinite;display:block}
#scroll-ind .d{animation:sb1 .5s ease-in-out infinite;display:block}
#scroll-ind .l,#scroll-ind .r{display:none}
#scroll-ind.h .u,#scroll-ind.h .d{display:none}
#scroll-ind.h .l{animation:sb0 .5s ease-in-out infinite;display:block}
#scroll-ind.h .r{animation:sb1 .5s ease-in-out infinite;display:block}
#scroll-ind.h .m{display:none}

/* Click bar */
#click-bar{display:flex;padding:6px 8px;gap:6px;background:var(--bg2);border-top:1px solid var(--border)}
#click-bar button{flex:1;padding:14px 0;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg4);color:var(--text);touch-action:manipulation;transition:transform .1s cubic-bezier(.34,1.56,.64,1),background .1s}
#click-bar button:active{transform:scale(.96);background:var(--text5)}
#click-bar .left{color:var(--accent)}
#click-bar .right{color:var(--danger)}
#click-bar .drag-btn{flex:0 0 52px;font-size:18px;color:var(--text3);background:var(--drag-bg)}
#click-bar .drag-btn.on{color:var(--accent);background:var(--drag-on-bg);box-shadow:0 0 8px var(--glow2)}

/* Bottom nav — mode toggle button */
#mode-nav-btn .icon{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
#mode-nav-btn.touch .icon{transform:rotate(0)}
#mode-nav-btn.mouse .icon{transform:rotate(180deg)}

/* Media page */
#media-page{align-items:center;justify-content:center;gap:20px;padding:20px}
#media-page .row{display:flex;gap:16px;align-items:center;justify-content:center}
#media-page button{
  border:none;border-radius:50%;background:var(--bg4);color:var(--text);
  width:64px;height:64px;font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
  transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .15s,box-shadow .15s;
  will-change:transform;-webkit-tap-highlight-color:transparent
}
#media-page button:active{transform:scale(.88);background:var(--text5)}
#media-page .big{width:80px;height:80px;font-size:32px;background:var(--accent);color:#000}
#media-page .big:active{transform:scale(.85);background:var(--accent2)}
#media-page .vol-row{width:100%;max-width:320px;display:flex;gap:12px;align-items:center;justify-content:center;margin-top:8px}
#media-page .vol-row button{width:52px;height:52px;font-size:18px;box-shadow:0 0 0 0 var(--glow6)}
#media-page .label{font-size:11px;color:var(--text4);text-align:center;margin-top:2px}

/* Play/Pause crossfade flip */
#media-play{position:relative}
#media-play .pw{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
#media-play .pi,#media-play .pa{transition:opacity .25s,transform .3s cubic-bezier(.34,1.56,.64,1);position:absolute}
#media-play .pa{opacity:0;transform:scale(.4)}
#media-play.playing .pi{opacity:0;transform:scale(.4)}
#media-play.playing .pa{opacity:1;transform:scale(1)}

/* Mute toggle crossfade */
#media-mute{position:relative}
#media-mute .mu,#media-mute .mm{transition:opacity .25s,transform .28s cubic-bezier(.34,1.56,.64,1);position:absolute}
#media-mute .mm{opacity:0;transform:scale(.3) rotate(-25deg)}
#media-mute.muted .mu{opacity:0;transform:scale(.3) rotate(25deg)}
#media-mute.muted .mm{opacity:1;transform:scale(1) rotate(0)}

/* Volume button ring pulse */
@keyframes vring{to{box-shadow:0 0 0 18px var(--glow6)}}
.vol-row button:active{animation:vring .35s ease-out}

/* Link page */
#link-page{align-items:center;padding:24px 20px;gap:16px}
#link-page .card{width:100%;max-width:360px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px}
#link-page .card h3{font-size:14px;color:var(--text3);margin-bottom:8px;font-weight:400}
#link-page .card .url{font-size:12px;color:var(--accent);word-break:break-all;padding:10px;background:var(--bg);border-radius:8px;line-height:1.5;margin-bottom:6px}
#link-page .card .copy-btn{font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;padding:4px 0}
#link-page .card .copy-btn:active{color:var(--accent)}
#link-page .divider{width:100%;max-width:360px;display:flex;align-items:center;gap:12px;color:var(--text5);font-size:11px}
#link-page .divider::before,#link-page .divider::after{content:'';flex:1;height:1px;background:var(--border)}
#link-page .email-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
#link-page .email-form input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;outline:none;box-sizing:border-box}
#link-page .email-form input:focus{border-color:var(--accent)}
#link-page .email-form input::placeholder{color:var(--text4)}
#link-page .email-form button{width:100%;padding:14px;border:none;border-radius:10px;background:var(--accent);color:#000;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
#link-page .email-form button:active{opacity:.7}
#link-page .email-form button:disabled{background:var(--disabled-bg);color:var(--text4)}
#link-page .msg{font-size:12px;text-align:center;padding:4px 0;min-height:20px}
#link-page .msg.ok{color:var(--accent)}
#link-page .msg.err{color:var(--danger)}
#link-page .msg.wait{color:var(--text3)}

/* Bottom nav */
#bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--bg2);padding-bottom:env(safe-area-inset-bottom)}
#bottom-nav button{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--text4);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
#bottom-nav button .icon{font-size:20px;line-height:1;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 700,'GRAD' 0,'opsz' 20;color:#fff}
:root.light #bottom-nav button .icon{color:#000}
#bottom-nav button.active{color:var(--accent)}

/* Sensitivity panel */
#sens-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg3);border-top:1px solid var(--border2);padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s;z-index:10}
#sens-panel.open{transform:translateY(0)}
#sens-panel .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#sens-panel .header span{font-size:13px;color:var(--text3)}
#sens-panel .header button{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer}
#sens-panel input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--text5);outline:none}
#sens-panel input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer}
#sens-panel input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
</style>
</head>
<body>
<div id="app">
  <div id="status-bar">
    <span><span class="dot" id="status-dot"></span><span id="status-text">Connecting...</span></span>
    <span style="display:flex;align-items:center;gap:8px">
      <span id="status-ip"></span>
      <span id="mode-indicator" style="font-size:10px;color:var(--text4)">relative</span>
      <span id="theme-btn">☾</span>
    </span>
  </div>

  <!-- Touchpad Page -->
  <div class="page active" id="touchpad-page">
    <div id="touchpad">
      <div id="touch-cursor"></div>
      <div id="tap-ripple"></div>
      <div id="long-ring"></div>
      <div id="scroll-ind"><span class="u">▲</span><span class="m">━</span><span class="d">▼</span><span class="l">◄</span><span class="r">►</span></div>
      <span id="touchpad-label">Touch & drag to move</span>
      <div id="scroll-zone">↕</div>
    </div>
    <div id="click-bar">
      <button class="left" data-button="left">Left</button>
      <button class="drag-btn" id="drag-toggle" data-drag="0">⊞</button>
      <button class="right" data-button="right">Right</button>
    </div>
  </div>

  <!-- Media Page -->
  <div class="page" id="media-page">
    <div class="row">
      <div><button id="media-prev">⏮</button><div class="label">Previous</div></div>
      <div><button class="big" id="media-play"><span class="pw"><span class="pi">▶</span><span class="pa">⏸</span></span></button><div class="label">Play/Pause</div></div>
      <div><button id="media-next">⏭</button><div class="label">Next</div></div>
    </div>
    <div class="vol-row">
      <button id="media-vol-down">▾</button>
      <button id="media-mute"><span class="mu">○</span><span class="mm">⊘</span></button>
      <button id="media-vol-up">▴</button>
    </div>
  </div>

  <!-- Link Page -->
  <div class="page" id="link-page">
    <div class="card">
      <h3>Your Tunnel Link</h3>
      <div class="url" id="tunnel-url-display">Waiting for tunnel...</div>
      <button class="copy-btn" id="copy-url">⊕ Copy to clipboard</button>
    </div>

    <div class="divider">or email it to your phone</div>

    <div class="email-form">
      <input type="email" id="email-input" placeholder="Email or SMS gateway address" inputmode="email" autocomplete="email">
      <button id="send-email-btn">Send to my phone</button>
      <div class="msg" id="email-msg"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div id="bottom-nav">
    <button class="active" data-tab="touchpad-page"><span class="icon">mouse</span>Touchpad</button>
    <button data-tab="media-page"><span class="icon">music_note</span>Media</button>
    <button data-tab="link-page"><span class="icon">link</span>Link</button>
    <button id="mode-nav-btn" class="touch"><span class="icon">swap_horiz</span><span id="mode-nav-label">Mouse</span></button>
    <button id="settings-btn"><span class="icon">settings</span></button>
  </div>

  <!-- Sensitivity Panel -->
  <div id="sens-panel">
    <div class="header">
      <span>Mouse Sensitivity: <span id="sens-value">1.0</span>x</span>
      <button id="sens-close">Done</button>
    </div>
    <input type="range" id="sens-slider" min="0.2" max="3.0" step="0.1" value="1.0">
  </div>
</div>

<script src="/static/socket.io.min.js"></script>
<script>
const socket = io({
  transports: ['websocket', 'polling'],
  reconnection: true,
  reconnectionAttempts: Infinity,
  reconnectionDelay: 1000,
  reconnectionDelayMax: 5000,
  timeout: 5000,
});
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const statusIp = document.getElementById('status-ip');
const touchpad = document.getElementById('touchpad');
const sensSlider = document.getElementById('sens-slider');
const sensValue = document.getElementById('sens-value');
const sensPanel = document.getElementById('sens-panel');
const dragToggle = document.getElementById('drag-toggle');

let sensitivity = 1.0;
let dragMode = false;
let touches = {};
let lastPos = null;
let touchStartTime = 0;
let lastMoveTime = 0;
let touchMoved = false;
let longTimer = null;
let longFired = false;
let scrollTimeout = null;
let lastTapTime = 0;
let twoFingerCount = 0;
let tunnelUrl = '';

const tunnelUrlDisplay = document.getElementById('tunnel-url-display');
const copyBtn = document.getElementById('copy-url');
const emailInput = document.getElementById('email-input');
const sendBtn = document.getElementById('send-email-btn');
const emailMsg = document.getElementById('email-msg');
const touchCursor = document.getElementById('touch-cursor');
const tapRipple = document.getElementById('tap-ripple');
const longRing = document.getElementById('long-ring');
const scrollInd = document.getElementById('scroll-ind');
const modeNavBtn = document.getElementById('mode-nav-btn');
const modeNavLabel = document.getElementById('mode-nav-label');
const themeBtn = document.getElementById('theme-btn');

let mode = 'touchpad';

/* --- Theme --- */
if (localStorage.getItem('theme') === 'light') {
  document.documentElement.classList.add('light');
  themeBtn.textContent = '☀';
}
themeBtn.addEventListener('click', () => {
  const isLight = document.documentElement.classList.toggle('light');
  themeBtn.textContent = isLight ? '☀' : '☾';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});
let screenW = 1920;
let screenH = 1080;

socket.on('connect', () => {
  statusDot.className = 'dot on';
  statusText.textContent = 'Connected';
  socket.emit('request_tunnel_url');
});

socket.on('disconnect', () => {
  statusDot.className = 'dot';
  statusText.textContent = 'Disconnected';
});

socket.on('reconnect_attempt', (attempt) => {
  statusText.textContent = `Reconnecting (${attempt})...`;
});

socket.on('reconnect', () => {
  statusDot.className = 'dot on';
  statusText.textContent = 'Connected';
});

socket.on('connect_error', (err) => {
  statusDot.className = 'dot';
  statusText.textContent = 'Connection error';
});

socket.on('screen_info', (data) => {
  if (data.ip) statusIp.textContent = data.ip;
  if (data.width) screenW = data.width;
  if (data.height) screenH = data.height;
  if (data.tunnel_url) updateTunnelUrl(data.tunnel_url);
});

socket.on('tunnel_url', (data) => {
  if (data.url) updateTunnelUrl(data.url);
});

function updateTunnelUrl(url) {
  tunnelUrl = url;
  tunnelUrlDisplay.textContent = url;
}

/* --- Fetch tunnel URL from REST API as fallback --- */
fetch('/api/tunnel-url').then(r => r.json()).then(data => {
  if (data.url) updateTunnelUrl(data.url);
}).catch(() => {});

/* --- Copy URL --- */
copyBtn.addEventListener('click', () => {
  if (!tunnelUrl) return;
  navigator.clipboard.writeText(tunnelUrl).then(() => {
    copyBtn.textContent = '✓ Copied!';
    setTimeout(() => { copyBtn.textContent = '⊕ Copy to clipboard'; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = tunnelUrl;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    copyBtn.textContent = '/ Copied!';
    setTimeout(() => { copyBtn.textContent = '⊕ Copy to clipboard'; }, 2000);
  });
});

/* --- Send URL via email --- */
sendBtn.addEventListener('click', () => {
  const email = emailInput.value.trim();
  if (!email || !email.includes('@') || !email.includes('.')) {
    emailMsg.className = 'msg err';
    emailMsg.textContent = 'Please enter a valid email address.';
    return;
  }

  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';
  emailMsg.className = 'msg wait';
  emailMsg.textContent = 'Sending...';

  fetch('/api/send-url', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  }).then(r => r.json()).then(data => {
    if (data.success) {
      emailMsg.className = 'msg ok';
      emailMsg.textContent = '✓ Sent! Check your phone.';
      emailInput.value = '';
    } else {
      emailMsg.className = 'msg err';
      emailMsg.textContent = data.error || 'Failed to send.';
    }
  }).catch(err => {
    emailMsg.className = 'msg err';
    emailMsg.textContent = 'Network error. Are you connected?';
  }).finally(() => {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send to my phone';
    setTimeout(() => { emailMsg.textContent = ''; }, 8000);
  });
});

/* --- Mode Toggle (in bottom nav) --- */
function toggleMode() {
  const prev = mode;
  mode = mode === 'touchpad' ? 'mouse' : 'touchpad';
  modeNavBtn.classList.toggle('mouse', mode === 'mouse');
  modeNavBtn.classList.toggle('touch', mode === 'touchpad');
  modeNavLabel.textContent = mode === 'touchpad' ? 'Mouse' : 'Touch';
  document.getElementById('mode-indicator').textContent = mode === 'touchpad' ? 'relative' : 'absolute';
  document.getElementById('touchpad-label').textContent = mode === 'touchpad' ? 'Touch & drag to move' : 'Touch screen to position cursor';
  dragToggle.style.display = mode === 'touchpad' ? '' : 'none';
  resetTouchState();
  if (mode !== prev) navigator.vibrate && navigator.vibrate(8);
}
modeNavBtn.addEventListener('click', toggleMode);

/* --- Touchpad Logic --- */
function absPos(t) {
  if (!screenW || !screenH) return;
  const rect = touchpad.getBoundingClientRect();
  if (!rect.width || !rect.height) return;
  const rx = Math.max(0, Math.min(1, (t.clientX - rect.left) / rect.width));
  const ry = Math.max(0, Math.min(1, (t.clientY - rect.top) / rect.height));
  socket.emit('mouse_abs', { x: Math.round(rx * screenW), y: Math.round(ry * screenH) });
}

function resetTouchState() {
  touchpad.classList.remove('dim');
  lastPos = null;
  touchMoved = false;
  touchCursor.classList.remove('show');
  if (longTimer) { clearTimeout(longTimer); longTimer = null; }
}

function moveCursor(dx, dy) {
  const now = Date.now();
  let factor = sensitivity;
  const dt = now - lastMoveTime;
  if (dt > 0 && dt < 100) {
    const speed = Math.sqrt(dx * dx + dy * dy) / dt;
    const accel = Math.min(4, 1 + speed * 0.12);
    factor *= accel;
  }
  lastMoveTime = now;
  if (dragMode) factor *= 1.2;
  socket.emit('mouse_move', { dx: Math.round(dx * factor), dy: Math.round(dy * factor) });
}

function doTap(x, y, button) {
  tapRipple.style.left = x + 'px';
  tapRipple.style.top = y + 'px';
  tapRipple.classList.remove('go');
  void tapRipple.offsetHeight;
  tapRipple.classList.add('go');
  socket.emit('click', { button });
  navigator.vibrate && navigator.vibrate(button === 'right' ? 15 : 10);
}

touchpad.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchpad.classList.add('dim');

  for (const t of e.changedTouches) {
    touches[t.identifier] = { lastX: t.clientX, lastY: t.clientY };
  }

  const count = e.touches.length;

  if (count === 1) {
    const t = e.changedTouches[0];
    lastPos = { x: t.clientX, y: t.clientY };
    lastMoveTime = Date.now();
    touchStartTime = lastMoveTime;
    touchMoved = false;
    longFired = false;
    twoFingerCount = 0;

    const rect = touchpad.getBoundingClientRect();
    touchCursor.style.left = (t.clientX - rect.left) + 'px';
    touchCursor.style.top = (t.clientY - rect.top) + 'px';
    touchCursor.classList.add('show');

    if (mode === 'mouse') {
      absPos(t);
    }
  } else if (count === 2) {
    twoFingerCount = 2;
    if (longTimer) { clearTimeout(longTimer); longTimer = null; }
  }
});

touchpad.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const count = e.touches.length;

  if (count === 1) {
    const t = e.touches[0];
    const rect = touchpad.getBoundingClientRect();
    touchCursor.style.left = (t.clientX - rect.left) + 'px';
    touchCursor.style.top = (t.clientY - rect.top) + 'px';

    if (mode === 'mouse') {
      absPos(t);
      lastPos = { x: t.clientX, y: t.clientY };
      touches[t.identifier] = { lastX: t.clientX, lastY: t.clientY };
      return;
    }

    if (lastPos) {
      let dx = t.clientX - lastPos.x;
      let dy = t.clientY - lastPos.y;

      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        touchMoved = true;
        moveCursor(dx, dy);
      }
      lastPos = { x: t.clientX, y: t.clientY };
      touches[t.identifier] = { lastX: t.clientX, lastY: t.clientY };
    }
  } else if (count === 2) {
    touchCursor.classList.remove('show');
    if (longTimer) { clearTimeout(longTimer); longTimer = null; }

    const t1 = e.touches[0];
    const t2 = e.touches[1];
    const prev1 = touches[t1.identifier];
    const prev2 = touches[t2.identifier];

    if (prev1 && prev2) {
      const avgDx = ((t1.clientX - prev1.lastX) + (t2.clientX - prev2.lastX)) / 2;
      const avgDy = ((t1.clientY - prev1.lastY) + (t2.clientY - prev2.lastY)) / 2;
      if (Math.abs(avgDx) > 5 || Math.abs(avgDy) > 5) {
        touchMoved = true;
        socket.emit('scroll', { dx: Math.round(avgDx * 2), dy: Math.round(avgDy * 2) });
        scrollInd.classList.add('show');
        scrollInd.classList.toggle('h', Math.abs(avgDx) > Math.abs(avgDy));
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => scrollInd.classList.remove('show'), 800);
      }
    }

    touches[t1.identifier] = { lastX: t1.clientX, lastY: t1.clientY };
    touches[t2.identifier] = { lastX: t2.clientX, lastY: t2.clientY };
    lastPos = { x: t1.clientX, y: t1.clientY };
  }
});

touchpad.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    delete touches[t.identifier];
  }

  const remaining = Object.keys(touches).length;
  const now = Date.now();

  if (mode === 'mouse' && e.changedTouches.length === 1 && !touchMoved) {
    const t = e.changedTouches[0];
    const rect = touchpad.getBoundingClientRect();
    doTap(t.clientX - rect.left, t.clientY - rect.top, 'left');
  } else if (e.changedTouches.length === 2 && twoFingerCount === 2 && !touchMoved) {
    const rect = touchpad.getBoundingClientRect();
    const t = e.changedTouches[0];
    doTap(t.clientX - rect.left, t.clientY - rect.top, 'right');
  } else if (e.changedTouches.length === 1 && !touchMoved && !longFired && now - touchStartTime < 300) {
    const t = e.changedTouches[0];
    const rect = touchpad.getBoundingClientRect();

    if (now - lastTapTime < 350) {
      // Second tap → double click (doTap sends 1 click per tap = 2 total)
      doTap(t.clientX - rect.left, t.clientY - rect.top, 'left');
      lastTapTime = 0;
    } else {
      lastTapTime = now;
      doTap(t.clientX - rect.left, t.clientY - rect.top, 'left');
    }
  }

  if (remaining === 0) {
    twoFingerCount = 0;
    resetTouchState();
  }
});

touchpad.addEventListener('touchcancel', () => {
  touches = {};
  twoFingerCount = 0;
  resetTouchState();
});

/* --- Click Buttons --- */
document.getElementById('click-bar').addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('button');
  if (!btn || btn.id === 'drag-toggle') return;
  const button = btn.dataset.button;
  socket.emit('click', { button });
  navigator.vibrate && navigator.vibrate(10);
});

dragToggle.addEventListener('click', () => {
  dragMode = !dragMode;
  dragToggle.classList.toggle('on', dragMode);
  dragToggle.dataset.drag = dragMode ? '1' : '0';
  dragToggle.textContent = dragMode ? '⊟' : '⊞';
  navigator.vibrate && navigator.vibrate(10);
});

/* --- Media Controls --- */
let isPlaying = false;
let isMuted = false;

function mediaAction(action) {
  socket.emit('media', { action });
  navigator.vibrate && navigator.vibrate(10);
}

document.getElementById('media-play').addEventListener('click', () => {
  isPlaying = !isPlaying;
  document.getElementById('media-play').classList.toggle('playing', isPlaying);
  mediaAction('play_pause');
});
document.getElementById('media-next').addEventListener('click', () => mediaAction('next'));
document.getElementById('media-prev').addEventListener('click', () => mediaAction('prev'));
document.getElementById('media-vol-up').addEventListener('click', () => mediaAction('vol_up'));
document.getElementById('media-vol-down').addEventListener('click', () => mediaAction('vol_down'));
document.getElementById('media-mute').addEventListener('click', () => {
  isMuted = !isMuted;
  document.getElementById('media-mute').classList.toggle('muted', isMuted);
  mediaAction('mute');
});

/* --- Bottom Nav --- */
document.getElementById('bottom-nav').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;

  if (btn.id === 'settings-btn') {
    sensPanel.classList.toggle('open');
    return;
  }
  if (btn.id === 'mode-nav-btn') return;

  const tab = btn.dataset.tab;

  sensPanel.classList.remove('open');
  document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
});

/* --- Sensitivity --- */
sensSlider.addEventListener('input', () => {
  sensitivity = parseFloat(sensSlider.value);
  sensValue.textContent = sensitivity.toFixed(1);
});

document.getElementById('sens-close').addEventListener('click', () => {
  sensPanel.classList.remove('open');
});
</script>
</body>
